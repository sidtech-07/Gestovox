<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestoVox Pro | Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg"></div>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <h1 class="logo">GestoVox<span>Pro</span></h1>
            
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="auth-container">
            <div class="hero-content">
                <h2>Next-Gen Human-Computer Interaction</h2>
                <p class="subtext">Control your digital world with gestures and voice commands</p>
                <div class="features-grid">
                    <div class="feature-card">
                        <i class="fas fa-hand-paper"></i>
                        <h3>Gesture Control</h3>
                    </div>
                    <div class="feature-card">
                        <i class="fas fa-microphone"></i>
                        <h3>Voice Commands</h3>
                    </div>
                    <div class="feature-card">
                        <i class="fas fa-mouse"></i>
                        <h3>Virtual Mouse</h3>
                    </div>
                </div>
            </div>

            <div class="login-box">
                <h2>Get Started</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" required>
                        <label for="password">Password</label>
                    </div>
                    <button type="submit" class="glow-btn">
                        <span class="gradient-text">Continue</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 GestureControl Pro. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com/sidtech-07"><i class="fab fa-github">sidtech-07</i></a>
                <a href="https://www.linkedin.com/in/pawan-badgujar-03216134b"><i class="fab fa-linkedin"> Pawan Badgujar </i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
