<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to your CSS file -->
</head>
<body>
    <div class="gradient-bg"></div>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <h1 class="logo">GestVox<span>Pro</span></h1>
            <nav class="main-nav">
                <a href="about.html">About Us</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <section class="contact-section">
    
        <div class="contact-container">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you! Whether you have a question, feedback, or just want to say hello, feel free to reach out.</p>
            
            <form class="contact-form" action="pawanbadgujar6954@gmail.com" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter the subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
                </div>
                <input type="hidden" name="_next" value="thank-you.html">
                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
